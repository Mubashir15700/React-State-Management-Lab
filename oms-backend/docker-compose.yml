services:
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090" # Prometheus UI
    extra_hosts:
      - "host.docker.internal:host-gateway" # This allows Prometheus to scrape metrics from your NestJS app running on the host machine

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Default login is admin / admin
